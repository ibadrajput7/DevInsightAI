version: "3.8"

services:
  redis:
    image: redis
    container_name: devinsightai_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    container_name: devinsightai_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"